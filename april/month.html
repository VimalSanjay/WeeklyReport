<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>April Reports - Weekly Report</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root { --primary: #fcb415; --primary-dark: #e09f00; --light: #1a1a1a; --gray: #6f6f6f; }
        body { font-family: 'Poppins', sans-serif; background: #ffffff; min-height: 100vh; color: #1a1a1a; overflow-x: hidden; }
        body::before { content: ''; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle at 25% 25%, rgba(252, 180, 21, 0.06) 0%, transparent 45%), radial-gradient(circle at 75% 75%, rgba(252, 180, 21, 0.06) 0%, transparent 45%); pointer-events: none; z-index: -1; }
        .container { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px 20px; }
        .back-btn { position: fixed; top: 20px; left: 20px; padding: 12px 24px; background: var(--primary); color: #1a1a1a; font-weight: 600; font-size: 14px; text-decoration: none; border-radius: 30px; z-index: 1000; transition: all 0.3s ease; box-shadow: 0 5px 20px rgba(252, 180, 21, 0.3); }
        .back-btn:hover { transform: scale(1.05); box-shadow: 0 10px 30px rgba(252, 180, 21, 0.5); }
        .logo-container { width: 160px; height: 160px; background: #ffffff; border-radius: 30px; display: flex; align-items: center; justify-content: center; margin-bottom: 30px; box-shadow: 0 20px 60px rgba(252, 180, 21, 0.4); position: relative; animation: float 6s ease-in-out infinite; }
        .logo-container::before { content: ''; position: absolute; inset: -4px; background: linear-gradient(135deg, #fcb415, #e09f00, #fcb415); border-radius: 34px; z-index: -1; animation: spin 3s linear infinite; }
        .logo-container::after { content: ''; position: absolute; inset: -8px; background: linear-gradient(135deg, rgba(252,180,21,0.3), transparent); border-radius: 38px; z-index: -2; animation: spin 4s linear infinite reverse; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }
        .logo-container img { width: 200px; height: 200px; object-fit: contain; border-radius: 10px; }
        .subtitle { font-size: 14px; letter-spacing: 4px; text-transform: uppercase; color: var(--primary); margin-bottom: 15px; font-weight: 500; }
        .title { font-family: 'Playfair Display', serif; font-size: 52px; font-weight: 700; color: #1a1a1a; margin-bottom: 10px; }
        .nav-buttons { display: flex; flex-wrap: wrap; gap: 20px; justify-content: center; max-width: 900px; }
        .nav-btn { padding: 25px 45px; font-size: 18px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; border: none; border-radius: 60px; cursor: pointer; transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1); position: relative; overflow: hidden; text-decoration: none; display: inline-flex; flex-direction: column; align-items: center; min-width: 200px; }
        .nav-btn span { font-size: 12px; font-weight: 400; margin-top: 8px; opacity: 0.7; }
        .nav-btn-week { background: linear-gradient(135deg, #ffffff 0%, #e8e8e8 100%); color: #1a1a1a; box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3); }
        .nav-btn-week:hover { transform: translateY(-5px) scale(1.05); box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4); }
        .nav-btn-active { background: linear-gradient(135deg, var(--primary), var(--primary-dark)); color: #1a1a1a; box-shadow: 0 10px 40px rgba(252, 180, 21, 0.4); }
        .nav-btn-active:hover { transform: translateY(-5px) scale(1.05); box-shadow: 0 20px 60px rgba(252, 180, 21, 0.6); }
        .nav-btn-overview { background: linear-gradient(135deg, #f5f5f5 0%, #eeeeee 100%); color: #1a1a1a; border: 2px solid rgba(252, 180, 21, 0.3); box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1); width: 100%; max-width: 420px; }
        .nav-btn-overview:hover { transform: translateY(-5px) scale(1.05); border-color: var(--primary); box-shadow: 0 20px 60px rgba(252, 180, 21, 0.3); }
        .nav-btn::before { content: ''; position: absolute; inset: 0; background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.3) 50%, transparent 100%); transform: translateX(-100%); transition: transform 0.5s ease; }
        .nav-btn:hover::before { transform: translateX(100%); }
        .footer { position: fixed; bottom: 20px; font-size: 12px; color: rgba(0, 0, 0, 0.4); letter-spacing: 1px; }
        @media (max-width: 768px) { .title { font-size: 36px; } .nav-btn { min-width: 160px; padding: 20px 30px; font-size: 14px; } .logo-container { width: 130px; height: 130px; } .logo-container img { width: 80px; height: 80px; } }
    </style>
</head>
<body>
    <a href="../index.html" class="back-btn">← Back to Home</a>
    <div class="container">
        <div class="logo-container"><img src="./assets/os2 logo.png" alt="OS2 Logo" /></div>
        <p class="subtitle">April 2026 Reports</p>
        <h1 class="title">Monthly Archive</h1>
        
        <div class="nav-buttons">
            <a href="week3.html" class="nav-btn nav-btn-week">Week 3<span>Report</span></a>
            <a href="week4.html" class="nav-btn nav-btn-active">Week 4<span>Current</span></a>
            <a href="overview.html" class="nav-btn nav-btn-overview">Monthly Overview<span>April Summary</span></a>
        </div>
    </div>
    <div class="footer">Aurae Solutions // April 2026</div>
</body>
</html>
