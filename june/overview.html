<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monthly Overview - Weekly Report</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root { --primary: #fcb415; --primary-dark: #e09f00; --light: #1a1a1a; --gray: #6f6f6f; }
        body { font-family: 'Poppins', sans-serif; background: #ffffff; min-height: 100vh; color: #1a1a1a; overflow-x: hidden; }
        body::before { content: ''; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle at 25% 25%, rgba(252, 180, 21, 0.06) 0%, transparent 45%), radial-gradient(circle at 75% 75%, rgba(252, 180, 21, 0.06) 0%, transparent 45%); pointer-events: none; z-index: -1; }
        .container { min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 80px 20px 40px; }
        .back-btn { position: fixed; top: 20px; left: 20px; padding: 12px 24px; background: var(--primary); color: #1a1a1a; font-weight: 600; font-size: 14px; text-decoration: none; border-radius: 30px; z-index: 1000; transition: all 0.3s ease; box-shadow: 0 5px 20px rgba(252, 180, 21, 0.3); }
        .back-btn:hover { transform: scale(1.05); box-shadow: 0 10px 30px rgba(252, 180, 21, 0.5); }
        .page-header { text-align: center; margin-bottom: 50px; animation: fadeInUp 0.8s ease-out; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(40px); } to { opacity: 1; transform: translateY(0); } }
        .page-title { font-family: 'Playfair Display', serif; font-size: 48px; font-weight: 700; color: #1a1a1a; margin-bottom: 15px; }
        .page-subtitle { font-size: 14px; letter-spacing: 4px; text-transform: uppercase; color: var(--primary); font-weight: 500; }
        .overview-card { width: 100%; max-width: 900px; background: rgba(0, 0, 0, 0.03); border: 1px solid rgba(252, 180, 21, 0.15); border-radius: 24px; padding: 40px; backdrop-filter: blur(10px); animation: scaleIn 0.8s ease-out; }
        @keyframes scaleIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        .month-selector { display: flex; justify-content: center; gap: 15px; margin-bottom: 40px; }
        .month-btn { padding: 12px 30px; background: rgba(0, 0, 0, 0.04); border: 1px solid rgba(252, 180, 21, 0.2); border-radius: 30px; color: rgba(0, 0, 0, 0.7); font-size: 14px; font-weight: 500; cursor: pointer; transition: all 0.3s ease; }
        .month-btn:hover { background: rgba(252, 180, 21, 0.1); border-color: var(--primary); color: #fff; }
        .month-btn.active { background: var(--primary); color: #1a1a1a; border-color: var(--primary); font-weight: 600; }
        .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 40px; }
        .stat-card { background: rgba(0, 0, 0, 0.03); border: 1px solid rgba(252, 180, 21, 0.15); border-radius: 16px; padding: 25px; text-align: center; transition: all 0.3s ease; }
        .stat-card:hover { transform: translateY(-5px); border-color: var(--primary); box-shadow: 0 15px 40px rgba(252, 180, 21, 0.15); }
        .stat-number { font-size: 42px; font-weight: 700; color: var(--primary); margin-bottom: 8px; font-family: 'Playfair Display', serif; }
        .stat-label { font-size: 13px; color: rgba(0, 0, 0, 0.6); text-transform: uppercase; letter-spacing: 1px; }
        .table-section { margin-top: 20px; }
        .table-title { font-size: 20px; font-weight: 600; color: var(--primary); margin-bottom: 25px; text-transform: uppercase; letter-spacing: 1.5px; }
        .overview-table { width: 100%; border-collapse: collapse; background: rgba(0, 0, 0, 0.02); border-radius: 16px; overflow: hidden; }
        .overview-table th { background: linear-gradient(135deg, rgba(252, 180, 21, 0.15), rgba(252, 180, 21, 0.08)); color: #1a1a1a; padding: 18px 24px; text-align: left; font-weight: 600; font-size: 14px; letter-spacing: 1px; border-bottom: 1px solid rgba(252, 180, 21, 0.2); }
        .overview-table th:first-child { border-radius: 12px 0 0 0; }
        .overview-table th:last-child { border-radius: 0 12px 0 0; }
        .overview-table td { padding: 18px 24px; color: rgba(0, 0, 0, 0.75); font-size: 15px; border-bottom: 1px solid rgba(0, 0, 0, 0.05); }
        .overview-table tr:last-child td { border-bottom: none; }
        .overview-table tr:hover td { background: rgba(252, 180, 21, 0.08); }
        .task-count { display: inline-flex; align-items: center; justify-content: center; min-width: 40px; height: 40px; background: rgba(252, 180, 21, 0.15); border-radius: 10px; font-weight: 600; color: var(--primary); }
        .total-row { background: rgba(252, 180, 21, 0.12) !important; }
        .total-row td { color: #000000 !important; font-weight: 700; }
        .footer { margin-top: 50px; font-size: 12px; color: rgba(0, 0, 0, 0.4); letter-spacing: 1px; }
        @media (max-width: 1024px) { .stats-row { grid-template-columns: repeat(3, 1fr); } }
        @media (max-width: 768px) { .page-title { font-size: 32px; } .stats-row { grid-template-columns: 1fr; } .overview-table th, .overview-table td { padding: 14px 16px; font-size: 13px; } .month-selector { flex-wrap: wrap; } }
    </style>
</head>
<body>
    <a href="month.html" class="back-btn">← Back to Home</a>
    <div class="container">
        <div class="page-header">
            <p class="page-subtitle">Monthly Overview</p>
            <h1 class="page-title">June 2026</h1>
        </div>
        <div class="overview-card">
            <div class="month-selector">
                <button class="month-btn active">June 2026</button>
            </div>
            <div class="stats-row">
                <div class="stat-card">
                    <div class="stat-number">-</div>
                    <div class="stat-label">Weeks Completed</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number">-</div>
                    <div class="stat-label">Working Days</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number">-</div>
                    <div class="stat-label">Total Tasks</div>
                </div>
            </div>
            <div class="table-section">
                <h3 class="table-title">Task Type Summary</h3>
                <table class="overview-table">
                    <thead>
                        <tr>
                            <th>Task Type</th>
                            <th>Total</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td>Blog</td>
                            <td><span class="task-count">-</span></td>
                        </tr>
                        <tr>
                            <td>Off-page</td>
                            <td><span class="task-count">-</span></td>
                        </tr>
                        <tr>
                            <td>E-book</td>
                            <td><span class="task-count">-</span></td>
                        </tr>
                        <tr>
                            <td>Flipbook</td>
                            <td><span class="task-count">-</span></td>
                        </tr>
                        <tr class="total-row">
                            <td><strong>Total</strong></td>
                            <td><span class="task-count">-</span></td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
        <div class="footer">Vimal Sanjay Weekly report</div>
    </div>
</body>
</html>
